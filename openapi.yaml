                  enum: [accepted, rejected, revision]
            example:
              decision: accepted
      responses:
        "200":
          description: Decision applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"
              example:
                suggestions:
                  - id: sugg-anca
                    status: accepted
                    reviewedAt: "2026-05-09T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
