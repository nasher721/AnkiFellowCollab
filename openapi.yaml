      operationId: listActivity
      tags: [Activity]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: kind
          in: query
          schema: { type: string }
          description: "Comma-separated activity kinds to filter"
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: object
                required: [activity, pagination]
                properties:
                  activity:
                    type: array
                    items:
                      $ref: "#/components/schemas/Activity"
                  pagination:
                    $ref: "#/components/schemas/CursorPage"

  # ─── Analytics ──────────────────────────────────────────
  /api/decks/{deckId}/analytics:
    get:
      summary: Deck analytics (editor+)
      operationId: getAnalytics
      tags: [Analytics]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  analytics:
                    $ref: "#/components/schemas/DeckAnalytics"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Media ──────────────────────────────────────────────
  /api/decks/{deckId}/media/{filename}:
    get:
      summary: Serve a media asset
      operationId: getMedia
      tags: [Media]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: filename
          in: path
          required: true
          schema: { type: string }
          description: Media filename (safe path check applied)
      responses:
        "200":
          description: Media binary stream
          content:
            image/png: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
            image/gif: { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
            audio/mpeg: { schema: { type: string, format: binary } }
            audio/wav: { schema: { type: string, format: binary } }
            audio/ogg: { schema: { type: string, format: binary } }
            video/mp4: { schema: { type: string, format: binary } }
        "302":
          description: Redirect to signed URL (Supabase)
        "404":
          $ref: "#/components/responses/NotFound"

  /api/decks/{deckId}/media/uploads:
    post:
      summary: Create signed upload URLs for large media files (Supabase only)
      operationId: createMediaUploads
      tags: [Media]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  maxItems: 300
                  items:
                    type: object
                    required: [filename, sha256, sizeBytes]
                    properties:
                      filename:
                        type: string
                        maxLength: 240
                      sha256:
                        type: string
                        pattern: "^[a-f0-9]{64}$"
                      sizeBytes:
                        type: integer
                        maximum: 104857600
                      mimeType:
                        type: string
                        default: "application/octet-stream"
            example:
              files:
                - filename: large.png
                  mimeType: image/png
                  sha256: dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
                  sizeBytes: 12000000
      responses:
        "201":
          description: Upload URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploads:
                    type: array
                    items:
                      type: object
                      properties:
                        filename: { type: string }
                        mimeType: { type: string }
                        sha256: { type: string }
                        sizeBytes: { type: integer }
                        storageBucket: { type: string }
                        storagePath: { type: string }
                        uploadUrl: { type: string, format: uri }
                        expiresAt: { type: string, format: date-time }
              example:
                uploads:
                  - filename: large.png
                    mimeType: image/png
                    sha256: dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
                    sizeBytes: 12000000
                    storageBucket: deckbridge-media
                    storagePath: deck-demo-zanki/dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd/large.png
                    uploadUrl: "https://storage.example/upload/sign/large.png?token=signed"
                    expiresAt: "2026-05-09T14:00:00.000Z"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── AI Features ───────────────────────────────────────────
  /api/decks/{deckId}/ai/settings:
    get:
      summary: Get AI settings for a deck
      operationId: getAiSettings
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: AI settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/DeckAiSettings"
    patch:
      summary: Update AI settings (owner only)
      operationId: updateAiSettings
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewBriefs: { type: boolean }
                embeddings: { type: boolean }
                conflictSummaries: { type: boolean }
                diagnostics: { type: boolean }
                qualityPulse: { type: boolean }
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/DeckAiSettings"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/decks/{deckId}/ai/artifacts:
    get:
      summary: List AI artifacts
      operationId: listAiArtifacts
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [active, dismissed, accepted, rejected, stale]
        - name: kind
          in: query
          schema:
            type: string
            enum: [review-brief, duplicate-link, conflict-summary, quality-issue, diagnostic, hint, digest]
        - name: subjectType
          in: query
          schema:
            type: string
            enum: [suggestion, card, conflict, setup-error, study-hint, digest]
        - name: subjectId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Artifact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: "#/components/schemas/AiArtifact"
    post:
      summary: Create an AI artifact (owner only)
      operationId: createAiArtifact
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiArtifactPayload"
      responses:
        "201":
          description: Artifact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact:
                    $ref: "#/components/schemas/AiArtifact"

  /api/decks/{deckId}/ai/artifacts/{artifactId}:
    patch:
      summary: Update AI artifact (owner only)
      operationId: updateAiArtifact
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: artifactId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, dismissed, accepted, rejected, stale]
                payload: { type: object }
      responses:
        "200":
          description: Artifact updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact:
                    $ref: "#/components/schemas/AiArtifact"

  /api/decks/{deckId}/ai/artifacts/{artifactId}/dismiss:
    post:
      summary: Dismiss an AI artifact (owner only)
      operationId: dismissAiArtifact
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: artifactId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Artifact dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact:
                    $ref: "#/components/schemas/AiArtifact"

  /api/decks/{deckId}/ai/artifacts/stale:
    post:
      summary: Mark active AI artifacts as stale (owner only)
      operationId: markAiArtifactsStale
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
                kind: { type: string }
                subjectType: { type: string }
                subjectId: { type: string }
      responses:
        "200":
          description: Artifacts marked stale
          content:
            application/json:
              schema:
                type: object
                properties:
                  stale: { type: integer }

  /api/decks/{deckId}/ai/pulse:
    get:
      summary: AI quality pulse summary (owner only)
      operationId: getAiPulse
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Quality pulse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiQualityPulse"

  /api/decks/{deckId}/ai/suggestions/{suggestionId}/brief:
    post:
      summary: Generate AI suggestion review brief (owner only)
      operationId: generateSuggestionBrief
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: suggestionId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Review brief generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestionBriefResult"

  /api/decks/{deckId}/ai/conflicts/{conflictId}/summary:
    post:
      summary: Generate AI conflict summary (owner only)
      operationId: generateConflictSummary
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: conflictId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Conflict summary generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiArtifactGenerationResult"

  /api/decks/{deckId}/ai/diagnostics/setup-error:
    post:
      summary: Generate AI setup diagnostic (owner only)
      operationId: generateSetupDiagnostic
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [error]
              properties:
                error:
                  $ref: "#/components/schemas/StructuredSetupError"
      responses:
        "201":
          description: Diagnostic generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiArtifactGenerationResult"

  /api/decks/{deckId}/ai/cards/{cardId}/embed:
    post:
      summary: Embed a single card and find duplicates (owner only)
      operationId: embedCard
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: cardId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                minScore: { type: number, default: 0.78, maximum: 1, minimum: 0 }
                limit: { type: integer, default: 10, maximum: 100, minimum: 1 }
      responses:
        "201":
          description: Card embedded and links found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCardEmbeddingResult"
        "200":
          description: Embedding disabled or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCardEmbeddingResult"

  /api/decks/{deckId}/ai/cards/embed:
    post:
      summary: Batch embed cards (owner only)
      operationId: embedCardsBatch
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cardIds:
                  type: array
                  items: { type: string }
                  description: "Empty array = all cards"
                limit:
                  type: integer
                  default: 25
                  maximum: 100
                minScore:
                  type: number
                  default: 0.78
      responses:
        "200":
          description: Batch embed results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [indexed, disabled, unavailable]
                  indexed: { type: integer }
                  results:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/AiCardEmbeddingResult"
                        - type: object
                          properties:
                            cardId: { type: string }

  /api/decks/{deckId}/ai/cards/{cardId}/related:
    get:
      summary: Get related/duplicate cards
      operationId: getRelatedCards
      tags: [AI]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: cardId
          in: path
          required: true
          schema: { type: string }
        - name: minScore
          in: query
          schema: { type: number, default: 0.78 }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 100 }
        - name: relationship
          in: query
          schema:
            type: string
            enum: [duplicate, near-duplicate, related]
      responses:
        "200":
          description: Related card links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRelatedCardsResult"

  # ─── State & Session (Legacy/Demo) ──────────────────────
  /api/state:
    get:
      summary: Full app state (legacy)
      operationId: getState
      tags: [Legacy]
      deprecated: true
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Full application state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"

  /api/session:
    patch:
      summary: Set active deck or demo role (dev only, legacy)
      operationId: patchSession
      tags: [Legacy]
      deprecated: true
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                activeDeckId: { type: string }
                role:
                  type: string
                  enum: [owner, editor, reviewer, contributor, viewer]
      responses:
        "200":
          description: Updated state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"

  # ─── AnkiConnect (Local dev only) ──────────────────────
  /api/anki/status:
    get:
      summary: Check AnkiConnect connection (local dev only)
      operationId: ankiStatus
      tags: [AnkiConnect]
      deprecated: true
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      responses:
        "200":
          description: Anki connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected: { type: boolean }
                  version: { type: integer, nullable: true }
                  error: { type: string, nullable: true }
                  sync:
                    type: object
                    properties:
                      ankiConnectUrl: { type: string }
                      connected: { type: boolean }
                      lastCheckedAt: { type: string, format: date-time, nullable: true }
                      lastPullAt: { type: string, format: date-time, nullable: true }
                      lastPushAt: { type: string, format: date-time, nullable: true }
                      lastAddonSync:
                        $ref: "#/components/schemas/AddonSyncResult"
                      conflicts:
                        type: array
                        items:
                          $ref: "#/components/schemas/SyncConflict"

  /api/anki/pull:
    post:
      summary: Pull notes from Anki (local dev only)
      operationId: ankiPull
      tags: [AnkiConnect]
      deprecated: true
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deckId: { type: string }
      responses:
        "200":
          description: Full deck state after pull
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"
        "410":
          $ref: "#/components/responses/Gone"

  /api/anki/push:
    post:
      summary: Push card fields/tags to Anki (local dev only)
      operationId: ankiPush
      tags: [AnkiConnect]
      deprecated: true
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deckId: { type: string }
      responses:
        "200":
          description: Push result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      updatedNotes: { type: integer }
                  state:
                    $ref: "#/components/schemas/AppState"
        "409":
          $ref: "#/components/responses/Conflict"
        "410":
          $ref: "#/components/responses/Gone"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Supabase JWT or `db_`-prefixed API token.
        In development, use DevAuth headers instead.
    DevAuth:
      type: apiKey
      in: header
      name: x-deckbridge-user-id
      description: Development-only identity header (requires x-deckbridge-user-email and x-deckbridge-user-name too)

  schemas:
    # ─── Core Models ──────────────────────────────────────────
    User:
      type: object
      required: [id, email, name]
      properties:
        id: { type: string, readOnly: true }
        email: { type: string, format: email }
        name: { type: string }

    DeckMember:
      type: object
      required: [deckId, userId, role, createdAt]
      properties:
        deckId: { type: string }
        userId: { type: string }
        role: { $ref: "#/components/schemas/MembershipRole" }
        createdAt: { type: string, format: date-time }

    MembershipRole:
      type: string
      enum: [owner, editor, reviewer, contributor, viewer]

    DeckCard:
      type: object
      required: [id, fields, tags, modifiedAt, modifiedBy]
      properties:
        id: { type: string }
        ankiNoteId: { type: integer, nullable: true }
        type: { type: string, default: "Basic" }
        modelName: { type: string }
        fieldOrder:
          type: array
          items: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }
          description: Field name → field value map
        tags:
          type: array
          items: { type: string }
        due: { type: integer, nullable: true }
        state: { type: string, default: "New" }
        modifiedAt: { type: string, format: date-time }
        modifiedBy: { type: string }
        suspended: { type: boolean, default: false }
        mediaRefs:
          type: array
          items: { type: string }
        sourceDeckName: { type: string, nullable: true }
        sourceDeckPath: { type: string, nullable: true }
        templateFront: { type: string }
        templateBack: { type: string }
        modelCss: { type: string }
        clozeOrd: { type: integer }

    Deck:
      type: object
      required: [id, name, description, owner, importedAt, cards]
      properties:
        id: { type: string, readOnly: true }
        name: { type: string }
        description: { type: string }
        owner: { type: string }
        importedAt: { type: string, format: date-time }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        cards:
          type: array
          items: { $ref: "#/components/schemas/DeckCard" }
        media:
          type: object
          description: Media assets keyed by filename
        models:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              fields:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    ordinal: { type: integer }
        aiSettings:
          $ref: "#/components/schemas/DeckAiSettings"
        source:
          type: object
          properties:
            filename: { type: string }
            format: { type: string }
            deckName: { type: string }
            deckPath: { type: string }

    DeckSummary:
      type: object
      required: [id, name, cardCount, noteCount, tagCount, importedAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        cardCount: { type: integer }
        noteCount: { type: integer }
        tagCount: { type: integer }
        noteTypes:
          type: array
          items: { type: string }
        pendingSuggestions: { type: integer }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        importedAt: { type: string, format: date-time }

    CompatDeck:
      type: object
      description: AnkiHub-compatible deck representation
      properties:
        uuid: { type: string }
        id: { type: string }
        name: { type: string }
        description: { type: string }
        owner: { type: string }
        card_count: { type: integer }
        note_count: { type: integer }
        tag_count: { type: integer }
        note_types:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        last_updated: { type: string, format: date-time, nullable: true }
        is_public: { type: boolean }

    CompatNote:
      type: object
      description: AnkiHub-compatible note representation
      properties:
        guid: { type: string }
        anki_note_id: { type: integer, nullable: true }
        note_type: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }
        tags:
          type: array
          items: { type: string }
        ankihub_id: { type: string }
        content_hash: { type: string }
        updated_at: { type: string, format: date-time, nullable: true }
        state: { type: string }
        suspended: { type: boolean }
        media_refs:
          type: array
          items: { type: string }

    CompatSuggestion:
      type: object
      description: AnkiHub-compatible suggestion representation
      properties:
        id: { type: string }
        deck_uuid: { type: string }
        card_guid: { type: string }
        author: { type: string }
        status: { type: string }
        raw_status: { type: string }
        created_at: { type: string, format: date-time }
        reviewed_at: { type: string, format: date-time, nullable: true }
        reviewed_by: { type: string, nullable: true }
        diff:
          type: object
          properties:
            reason: { type: string }
            proposed_fields:
              type: object
              additionalProperties: { type: string }
            proposed_tags:
              type: array
              items: { type: string }

    Suggestion:
      type: object
      required: [id, deckId, cardId, authorId, authorName, status, reason, createdAt]
      properties:
        id: { type: string }
        deckId: { type: string }
        cardId: { type: string }
        authorId: { type: string }
        authorName: { type: string }
        status:
          type: string
          enum: [pending, accepted, rejected, revision]
        reason: { type: string }
        createdAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        reviewedBy: { type: string, nullable: true }
        proposedFields:
          type: object
          additionalProperties: { type: string }
        proposedTags:
          type: array
          items: { type: string }

    MeResponse:
      type: object
      required: [user, memberships]
      properties:
        user: { $ref: "#/components/schemas/User" }
        memberships:
          type: array
          items: { $ref: "#/components/schemas/DeckMember" }
        decks:
          type: array
          items: { $ref: "#/components/schemas/DeckSummary" }

    AppState:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/DeckMember"
        decks:
          type: array
          items:
            $ref: "#/components/schemas/Deck"
        summaries:
          type: array
          items:
            $ref: "#/components/schemas/DeckSummary"
        activeDeckId: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/MembershipRole" }
        collaborators:
          type: array
          items:
            $ref: "#/components/schemas/Collaborator"
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/Suggestion"
        activity:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
        sync:
          $ref: "#/components/schemas/SyncState"

    Collaborator:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/MembershipRole" }
        accepted: { type: integer }

    Activity:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        text: { type: string }
        at: { type: string, format: date-time }

    SyncState:
      type: object
      properties:
        ankiConnectUrl: { type: string }
        connected: { type: boolean }
        lastCheckedAt: { type: string, format: date-time, nullable: true }
        lastPullAt: { type: string, format: date-time, nullable: true }
        lastPushAt: { type: string, format: date-time, nullable: true }
        lastAddonSync:
          $ref: "#/components/schemas/AddonSyncResult"
        lastError: { type: string, nullable: true }
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/SyncConflict"

    SyncConflict:
      type: object
      properties:
        id: { type: string }
        deckId: { type: string }
        cardId: { type: string }
        source: { type: string }
        detectedAt: { type: string, format: date-time }
        incomingFields:
          type: object
          additionalProperties: { type: string }
        localFields:
          type: object
          additionalProperties: { type: string }

    # ─── Add-on / Sync ──────────────────────────────────────────
    AddonCard:
      type: object
      required: [fields]
      properties:
        id: { type: string }
        ankiNoteId: { type: integer, nullable: true }
        type: { type: string }
        noteType: { type: string }
        modelName: { type: string }
        fieldOrder:
          type: array
          items: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }
        tags:
          type: array
          items: { type: string }
        due: { type: integer, nullable: true }
        state: { type: string }
        modifiedAt: { type: string, format: date-time }
        modifiedBy: { type: string }
        suspended: { type: boolean }
        mediaRefs:
          type: array
          items: { type: string }
        sourceDeckName: { type: string, nullable: true }
        sourceDeckPath: { type: string, nullable: true }
        templateFront: { type: string }
        templateBack: { type: string }
        modelCss: { type: string }
        clozeOrd: { type: integer }
        compressedFields:
          type: object
          description: Zlib+base64 compressed field values

    AddonSyncResult:
      type: object
      properties:
        syncedAt: { type: string, format: date-time }
        source: { type: string }
        client:
          type: object
          nullable: true
          properties:
            name: { type: string }
            version: { type: string }
            fingerprint: { type: string }
        stats:
          type: object
          properties:
            total: { type: integer }
            created: { type: integer }
            updated: { type: integer }
            skipped: { type: integer }
            conflicts: { type: integer }
            dryRun: { type: boolean }
            mediaReceived:
              type: integer
              description: Count of normalized media assets received with this sync result or batch.
        batch:
          type: object
          nullable: true
          properties:
            id: { type: string }
            index: { type: integer }
            total: { type: integer }
            totalCards: { type: integer }
            received: { type: integer }
            complete: { type: boolean }
        mediaReceived:
          type: integer
          description: Count of normalized media assets received with this sync result or batch.
        proof:
          $ref: "#/components/schemas/SyncProof"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/SyncConflict"

    SyncProof:
      type: object
      properties:
        syncedAt: { type: string, format: date-time }
        source: { type: string }
        client:
          type: object
          nullable: true
          properties:
            name: { type: string }
            version: { type: string }
            fingerprint: { type: string }
        stats:
          type: object
          properties:
            total: { type: integer }
            created: { type: integer }
            updated: { type: integer }
            skipped: { type: integer }
            conflicts: { type: integer }
            dryRun: { type: boolean }
            mediaReceived: { type: integer }
        batch:
          type: object
          nullable: true
          properties:
            id: { type: string }
            index: { type: integer }
            total: { type: integer }
            totalCards: { type: integer }
            received: { type: integer }
            complete: { type: boolean }
        mediaReceived: { type: integer }

    # ─── Comments ──────────────────────────────────────────
    Comment:
      type: object
      properties:
        id: { type: string }
        suggestionId: { type: string }
        deckId: { type: string }
        authorId: { type: string }
        authorName: { type: string }
        body: { type: string }
        parentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        resolvedBy: { type: string, nullable: true }

    # ─── Notifications ──────────────────────────────────────────
    Notification:
      type: object
      properties:
        id: { type: string }
        deckId: { type: string, nullable: true }
        kind: { type: string }
        body: { type: string }
        refId: { type: string, nullable: true }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }

    # ─── API Tokens ──────────────────────────────────────────
    ApiToken:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time, nullable: true }

    CreatedToken:
      allOf:
        - $ref: "#/components/schemas/ApiToken"
        - type: object
          required: [raw]
          properties:
            raw: { type: string, description: "Raw token value (only returned on creation)" }

    # ─── Add-on ──────────────────────────────────────────
    AddonVersion:
      type: object
      properties:
        version: { type: string, example: "1.2.0" }
        minVersion: { type: string, example: "0.1.0" }
        package: { type: string }
        name: { type: string }
        downloadUrl: { type: string, example: "/api/addon/download" }

    # ─── Storage ──────────────────────────────────────────
    StorageAsset:
      type: object
      properties:
        filename: { type: string }
        url: { type: string, format: uri }
        expiresAt: { type: string, format: date-time, nullable: true }

    # ─── Share Links ──────────────────────────────────────────
    ShareLink:
      type: object
      properties:
        id: { type: string }
        deckId: { type: string }
        token: { type: string }
        label: { type: string }
        passwordProtected: { type: boolean }
        expiresAt: { type: string, format: date-time, nullable: true }
        disabledAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }

    # ─── Invites ──────────────────────────────────────────
    DeckInvite:
      type: object
      properties:
        id: { type: string }
        deckId: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        status:
          type: string
          enum: [pending, accepted, declined, expired]
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        respondedAt: { type: string, format: date-time, nullable: true }

    # ─── Discover / Public ──────────────────────────────────
    PublicDeck:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        ownerName: { type: string }
        importedAt: { type: string, format: date-time }
        downloadCount: { type: integer }
        starCount: { type: integer }
        forkedFrom: { type: string, nullable: true }
        cardCount: { type: integer }
        noteTypes:
          type: array
          items: { type: string }
        sampleCards:
          type: array
          items:
            type: object
            additionalProperties: { type: string }

    # ─── Templates ──────────────────────────────────────────
    Template:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        authorName: { type: string }
        tags:
          type: array
          items: { type: string }
        starCount: { type: integer }
        isFeatured: { type: boolean }
        fields:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              description: { type: string }
        sampleCards:
          type: array
          items:
            type: object
            additionalProperties: { type: string }
        createdAt: { type: string, format: date-time }

    # ─── Study ──────────────────────────────────────────
    StudySession:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        deckId: { type: string }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time, nullable: true }
        durationSeconds: { type: integer }
        cardsStudied: { type: integer }
        cardsCorrect: { type: integer }
        newCards: { type: integer }
        reviewCards: { type: integer }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }

    CreateStudySessionPayload:
      type: object
      required: [deckId]
      properties:
        deckId: { type: string }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time, nullable: true }
        durationSeconds: { type: integer }
        cardsStudied: { type: integer }
        cardsCorrect: { type: integer }
        newCards: { type: integer }
        reviewCards: { type: integer }
        metadata: { type: object }

    # ─── Analytics ──────────────────────────────────────────
    DeckAnalytics:
      type: object
      properties:
        suggestions:
          type: object
          properties:
            total: { type: integer }
            accepted: { type: integer }
            rejected: { type: integer }
            pending: { type: integer }
            acceptanceRate: { type: integer, maximum: 100 }
        stars: { type: integer }
        leaderboard:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              total: { type: integer }
              accepted: { type: integer }
        cards:
          type: object
          properties:
            total: { type: integer }
            byState:
              type: object
              additionalProperties: { type: integer }
            byDifficulty:
              type: object
              properties:
                dueNow: { type: integer }
                soon: { type: integer }
                later: { type: integer }
                suspended: { type: integer }
                unknown: { type: integer }
        study:
          type: object
          properties:
            sessions:
              type: object
              properties:
                total: { type: integer }
                durationSeconds: { type: integer }
                cardsStudied: { type: integer }
                cardsCorrect: { type: integer }
                accuracyRate: { type: integer, maximum: 100 }
            weeklyTrend:
              type: array
              items:
                type: object
                properties:
                  date: { type: string }
                  count: { type: integer }
            strugglingCards:
              type: array
              items:
                type: object
                properties:
                  cardId: { type: string }
                  easeFactor: { type: number }
                  repetitions: { type: integer }
                  lastRating: { type: integer, nullable: true }
                  nextDue: { type: string, format: date-time }
                  front: { type: string }
                  back: { type: string }

    # ─── AI ──────────────────────────────────────────
    AiCapabilityStatus:
      type: object
      properties:
        state:
          type: string
          enum: [disabled, gateway-unreachable, auth-required, no-chat-model, no-embedding-model, ready]
        chatModel: { type: string, nullable: true }
        embeddingModel: { type: string, nullable: true }
        checkedAt: { type: string, format: date-time, nullable: true }
        message: { type: string }

    DeckAiSettings:
      type: object
      properties:
        reviewBriefs: { type: boolean }
        embeddings: { type: boolean }
        conflictSummaries: { type: boolean }
        diagnostics: { type: boolean }
        qualityPulse: { type: boolean }
        updatedAt: { type: string, format: date-time, nullable: true }
        updatedBy: { type: string, nullable: true }

    AiArtifact:
      type: object
      properties:
        id: { type: string }
        deckId: { type: string }
        subjectType:
          type: string
          enum: [suggestion, card, conflict, setup-error, study-hint, digest]
        subjectId: { type: string }
        kind:
          type: string
          enum: [review-brief, duplicate-link, conflict-summary, quality-issue, diagnostic, hint, digest]
        severity:
          type: string
          enum: [info, low, medium, high]
        status:
          type: string
          enum: [active, dismissed, accepted, rejected, stale]
        confidence: { type: number, minimum: 0, maximum: 1 }
        model: { type: string }
        promptVersion: { type: string }
        inputHash: { type: string }
        payload: { type: object }
        createdAt: { type: string, format: date-time }
        decidedAt: { type: string, format: date-time, nullable: true }
        decidedBy: { type: string, nullable: true }

    CreateAiArtifactPayload:
      type: object
      required: [subjectType, subjectId, kind, model, promptVersion, inputHash]
      properties:
        subjectType:
          type: string
          enum: [suggestion, card, conflict, setup-error, study-hint, digest]
          description: Type of subject this artifact relates to
        subjectId: { type: string, maxLength: 200, description: "ID of the subject entity" }
        kind:
          type: string
          enum: [review-brief, duplicate-link, conflict-summary, quality-issue, diagnostic, hint, digest]
          description: Kind of AI artifact
        severity:
          type: string
          enum: [info, low, medium, high]
          default: info
        status:
          type: string
          enum: [active, dismissed, accepted, rejected, stale]
          default: active
        confidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0
        model: { type: string, maxLength: 200 }
        promptVersion: { type: string, maxLength: 120 }
        inputHash: { type: string, maxLength: 128 }
        payload: { type: object, default: {} }

    AiQualityPulse:
      type: object
      properties:
        enabled: { type: boolean }
        status:
          type: string
          enum: [disabled, healthy, attention]
        generatedAt: { type: string, format: date-time }
        totalActive: { type: integer }
        summary:
          type: object
          properties:
            bySeverity:
              type: object
              additionalProperties: { type: integer }
            bySubjectType:
              type: object
              additionalProperties: { type: integer }
            byStaleness:
              type: object
              additionalProperties: { type: integer }
        groups:
          type: object
          properties:
            severity:
              type: array
              items:
                type: object
                properties:
                  key: { type: string }
                  count: { type: integer }
            subjectType:
              type: array
              items:
                type: object
                properties:
                  key: { type: string }
                  count: { type: integer }
            staleness:
              type: array
              items:
                type: object
                properties:
                  key: { type: string }
                  count: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/AiQualityPulseItem"

    AiQualityPulseItem:
      type: object
      properties:
        artifactId: { type: string }
        subjectType: { type: string }
        subjectId: { type: string }
        kind: { type: string }
        severity: { type: string }
        staleness:
          type: string
          enum: [fresh, aging, old, unknown]
        action:
          type: string
          enum: [suggestion, conflict, setup, card, artifact]
        label: { type: string }
        detail: { type: string }
        createdAt: { type: string, format: date-time }

    AiSuggestionBriefResult:
      type: object
      properties:
        status:
          type: string
          enum: [created, disabled, unavailable, invalid]
        code: { type: string }
        message: { type: string }
        artifact: { $ref: "#/components/schemas/AiArtifact", nullable: true }

    AiArtifactGenerationResult:
      type: object
      properties:
        status:
          type: string
          enum: [created, disabled, unavailable, invalid]
        code: { type: string }
        message: { type: string }
        artifact: { $ref: "#/components/schemas/AiArtifact", nullable: true }

    AiCardEmbeddingResult:
      type: object
      properties:
        status:
          type: string
          enum: [indexed, disabled, unavailable, invalid]
        code: { type: string }
        message: { type: string }
        embedding:
          type: object
          nullable: true
          properties:
            cardId: { type: string }
            deckId: { type: string }
            model: { type: string }
            dimensions: { type: integer }
            inputHash: { type: string }
            embedding:
              type: array
              items: { type: number }
              description: Vector embedding (omitted in list responses)
            metadata: { type: object }
            status:
              type: string
              enum: [active, stale]
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
        links:
          type: array
          items:
            $ref: "#/components/schemas/AiDuplicateLink"

    AiRelatedCardsResult:
      type: object
      properties:
        status:
          type: string
          enum: [ready, disabled]
        code: { type: string }
        message: { type: string }
        links:
          type: array
          items:
            $ref: "#/components/schemas/AiDuplicateLink"

    AiDuplicateLink:
      type: object
      properties:
        id: { type: string }
        deckId: { type: string }
        sourceCardId: { type: string }
        targetCardId: { type: string }
        artifactId: { type: string, nullable: true }
        score: { type: number }
        relationship:
          type: string
          enum: [duplicate, near-duplicate, related]
        rationale: { type: string }
        comparedFields:
          type: array
          items: { type: string }
        status:
          type: string
          enum: [active, dismissed, stale]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    StructuredSetupError:
      type: object
      required: [code, path, message]
      properties:
        code: { type: string, maxLength: 120 }
        path: { type: string, maxLength: 240 }
        message: { type: string, maxLength: 1000 }
        status: { type: integer, nullable: true }
        method: { type: string, maxLength: 20, nullable: true }
        source: { type: string, maxLength: 120, default: "setup-wizard" }
        details: { type: object, default: {} }

    # ─── Star Result ──────────────────────────────────────────
    StarResult:
      type: object
      properties:
        starred: { type: boolean }
        count: { type: integer }

    # ─── Pagination ──────────────────────────────────────────
    CursorPage:
      type: object
      required: [nextCursor, hasMore]
      properties:
        nextCursor: { type: string, nullable: true, description: "Opaque cursor for the next page. null = last page." }
        hasMore: { type: boolean, description: "Whether more results exist" }

    # ─── RFC 7807 Problem Details ────────────────────────────
    Problem:
      type: object
      description: RFC 7807 Problem Details
      required: [type, title, status, detail, code, details]
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the error type
          example: "https://api.deckbridge.app/errors/invalid_since"
        title:
          type: string
          description: Short human-readable error title
          example: "Invalid Since Parameter"
        status:
          type: integer
          description: HTTP status code
          example: 400
        detail:
          type: string
          description: Human-readable error detail
          example: "since must be a valid RFC 3339 UTC timestamp"
        instance:
          type: string
          format: uri
          description: URI identifying the specific occurrence
          example: "/api/decks/deck-abc123/suggestions"
        errors:
          type: array
          description: Field-level validation errors
          items:
            type: object
            properties:
              field: { type: string, description: "The field name" }
              message: { type: string, description: "Human-readable error for this field" }
        code:
          type: string
          description: Machine-readable error code
          example: "invalid_since"
        details:
          type: object
          description: Bounded machine-readable context for recovery.
          additionalProperties: true
          example:
            parameter: since
            expected: YYYY-MM-DDTHH:mm:ss.sssZ

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: "https://api.deckbridge.app/errors/invalid_sync_payload"
            title: "Invalid Sync Payload"
            status: 400
            detail: "Sync payload must include cards"
            code: "invalid_sync_payload"
            details:
              endpoint: sync_cards
              expected: "cards array with at least one card containing fields"
            instance: "/api/decks/deck-abc123/sync/cards"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: "https://api.deckbridge.app/errors/unauthorized"
            title: "Unauthorized"
            status: 401
            detail: "Missing or invalid Bearer token."
            code: "unauthorized"
            details: {}
    Forbidden:
      description: Insufficient permissions
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: "https://api.deckbridge.app/errors/forbidden"
            title: "Forbidden"
            status: 403
            detail: "You do not have the required role for this action."
            code: "forbidden"
            details: {}
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: "https://api.deckbridge.app/errors/deck_not_found"
            title: "Deck Not Found"
            status: 404
            detail: "The requested deck was not found."
            code: "deck_not_found"
            details: {}
    Conflict:
      description: Resource conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: "https://api.deckbridge.app/errors/conflict"
            title: "Conflict"
            status: 409
            detail: "Invite has already been accepted."
            code: "conflict"
