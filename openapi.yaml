  # ─── Sync (Anki Add-on) ──────────────────────────────────
  /api/decks/{deckId}/sync/cards:
    post:
      summary: Push card snapshots from the Anki add-on
      operationId: syncCards
      tags: [Sync]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cards]
              properties:
                cards:
                  type: array
                  maxItems: 50000
                  items:
                    $ref: "#/components/schemas/AddonCard"
                media: { type: object }
                dryRun: { type: boolean, default: false }
                allowCreate: { type: boolean, default: true }
                conflictPolicy:
                  type: string
                  enum: [detect, overwrite-platform]
                  default: detect
                returnState: { type: boolean, default: true }
                source: { type: string, default: "DeckBridge Anki add-on" }
                client:
                  type: object
                  properties:
                    name: { type: string }
                    version: { type: string }
                    fingerprint: { type: string }
                batch:
                  type: object
                  properties:
                    id: { type: string }
                    index: { type: integer, minimum: 0 }
                    total: { type: integer, minimum: 1, maximum: 1000 }
                    totalCards: { type: integer }
            example:
              returnState: false
              conflictPolicy: detect
              source: DeckBridge Anki add-on
              client:
                name: DeckBridge Sync
                version: 0.1.0
                fingerprint: macbook-local
              batch:
                id: batch-2026-05-09
                index: 0
                total: 1
                totalCards: 1
              cards:
                - id: anki-9001
                  ankiNoteId: 9001
                  modelName: Basic
                  fieldOrder: [Front, Back]
                  fields: { Front: "Question?", Back: "Answer" }
                  tags: [DeckBridge]
                  mediaRefs: [large.png]
      responses:
        "200":
          description: Sync result with stats and conflicts
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/AddonSyncResult"
                  state:
                    $ref: "#/components/schemas/AppState"
            example:
              result:
                syncedAt: "2026-05-09T12:00:00.000Z"
                source: DeckBridge Anki add-on
                client: { name: DeckBridge Sync, version: 0.1.0, fingerprint: macbook-local }
                stats: { total: 1, created: 0, updated: 1, skipped: 0, conflicts: 0, dryRun: false, mediaReceived: 1 }
                proof:
                  syncedAt: "2026-05-09T12:00:00.000Z"
                  source: DeckBridge Anki add-on
                  client: { name: DeckBridge Sync, version: 0.1.0, fingerprint: macbook-local }
                  stats: { total: 1, created: 0, updated: 1, skipped: 0, conflicts: 0, dryRun: false, mediaReceived: 1 }
                  batch: { id: batch-2026-05-09, index: 0, total: 1, totalCards: 1, received: 1, complete: true }
                  mediaReceived: 1
                conflicts: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/decks/{deckId}/sync/conflicts:
    post:
      summary: Record sync conflicts detected by the add-on
      operationId: recordSyncConflicts
      tags: [Sync]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conflicts]
              properties:
                conflicts:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      cardId: { type: string }
                      source: { type: string }
                      detectedAt: { type: string, format: date-time }
                      incomingFields:
                        type: object
                        additionalProperties: { type: string }
                      localFields:
                        type: object
                        additionalProperties: { type: string }
      responses:
        "200":
