openapi: "3.1.0"

info:
  title: DeckBridge API
  version: "1.0.0"
  description: |
    DeckBridge is an Anki deck collaboration workspace. This API powers the web app,
    the Anki add-on sync, and third-party integrations.

    ## API Design Principles
    - Resource-oriented REST over `/api/v1/`
    - Consistent camelCase property naming
    - RFC 7807 Problem Details for errors (`application/problem+json`)
    - Cursor-based pagination for all collection endpoints
    - Bearer token authentication (JWT or API tokens)

    ## Authentication
    Two modes depending on environment:

    | Mode | Mechanism | Headers |
    |------|-----------|---------|
    | Development | Dev identity headers | `x-deckbridge-user-id`, `x-deckbridge-user-email`, `x-deckbridge-user-name` |
    | Production | Bearer token | `Authorization: Bearer <token>` (JWT or `db_`-prefixed API token) |

    ## Rate Limiting
    | Limiter | Window | Default Limit | Applied To |
    |---------|--------|---------------|------------|
    | Upload | 60s | 5 | Deck/media upload endpoints |
    | Sync | 60s | 30 | Card sync endpoints |
    | Analytics | 60s | 60 | Analytics endpoints |
    | Read | 60s | 200 | List/read endpoints |

    ## Versioning Strategy
    Current version: `v1`. Breaking changes will increment the version.
    Deprecated endpoints return `Sunset` header and remain available for one minor cycle.
  contact:
    name: DeckBridge Team
  license:
    name: MIT

servers:
  - url: /
    description: Relative server URL (proxy-aware)

paths:
  # ─── Health & Status ───────────────────────────────────────────
  /api/health:
    get:
      summary: Server health check
      operationId: getHealth
      tags: [System]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok, repository, dataDir]
                properties:
                  ok: { type: boolean, example: true }
                  repository: { type: string, example: "SupabaseDeckBridgeRepository" }
                  dataDir: { type: string, example: ".deckbridge" }

  /api/ai/status:
    get:
      summary: AI gateway capabilities
      operationId: getAiCapabilities
      tags: [System]
      responses:
        "200":
          description: AI gateway status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCapabilityStatus"

  # ─── Add-on Distribution ──────────────────────────────────────
  /api/addon/version:
    get:
      summary: Anki add-on version info
      operationId: getAddonVersion
      tags: [Addon]
      responses:
        "200":
          description: Add-on version manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonVersion"

  /api/addon/download:
    get:
      summary: Download the Anki add-on package
      operationId: downloadAddon
      tags: [Addon]
      responses:
        "200":
          description: Binary .ankiaddon file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Me / Profile ─────────────────────────────────────────────
  /api/me:
    get:
      summary: Current user profile and memberships
      operationId: getMe
      tags: [User]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      responses:
        "200":
          description: User profile, memberships, and accessible decks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/profiles/{userId}:
    get:
      summary: Public user profile
      operationId: getProfile
      tags: [User]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Public profile and public decks
          content:
            application/json:
              schema:
                type: object
                required: [profile, decks]
                properties:
                  profile:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                  decks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        description: { type: string }
                        importedAt: { type: string, format: date-time }
                        downloadCount: { type: integer }
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── API Tokens ───────────────────────────────────────────────
  /api/tokens:
    get:
      summary: List API tokens
      operationId: listTokens
      tags: [User]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiToken"
    post:
      summary: Create API token
      operationId: createToken
      tags: [User]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  default: "Anki Add-on"
                  maxLength: 200
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedToken"

  /api/tokens/{tokenId}:
    delete:
      summary: Revoke an API token
      operationId: revokeToken
      tags: [User]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: tokenId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Token revoked

  # ─── Anki Login ──────────────────────────────────────────────
  /api/anki/login:
    post:
      summary: Authenticate via email/password (Supabase only)
      operationId: ankiLogin
      tags: [User]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  token: { $ref: "#/components/schemas/CreatedToken" }
                  decks:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeckSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/NotImplemented"

  # ─── Decks ──────────────────────────────────────────────────
  /api/decks:
    get:
      summary: List decks the user can access
      operationId: listDecks
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      responses:
        "200":
          description: List of deck summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  decks:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeckSummary"

  /api/decks/upload:
    post:
      summary: Upload an .apkg file to create a deck
      operationId: uploadDeck
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [deck]
              properties:
                deck:
                  type: string
                  format: binary
                  description: The .apkg file to upload
      responses:
        "201":
          description: Deck created with full state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/decks/sync/from-anki:
    post:
      summary: Create a deck from add-on sync payload (first-time sync)
      operationId: createDeckFromAnki
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deckName: { type: string }
                cards:
                  type: array
                  items:
                    $ref: "#/components/schemas/AddonCard"
                media: { type: object }
                returnState: { type: boolean, default: true }
      responses:
        "201":
          description: Deck created
          content:
            application/json:
              schema:
                type: object
                properties:
                  deck:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      cardCount: { type: integer }
                  result:
                    $ref: "#/components/schemas/AddonSyncResult"
                  state:
                    $ref: "#/components/schemas/AppState"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/decks/subscriptions:
    get:
      summary: AnkiHub-compatible subscriptions list
      operationId: listSubscriptions
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      deprecated: true
      responses:
        "200":
          description: Subscriptions in AnkiHub-compatible format
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items:
                      type: object
                      properties:
                        deck:
                          $ref: "#/components/schemas/CompatDeck"
                        lastSyncedAt: { type: string, format: date-time, nullable: true }
                        subscribedAt: { type: string, format: date-time, nullable: true }
                        role: { type: string }
                        pendingSuggestions: { type: integer }
                        pendingReviewCount: { type: integer }
                        unresolvedConflictCount: { type: integer }
                        capabilities: { type: object }
                  api:
                    type: object
                    properties:
                      namespace: { type: string }
                      compatibility: { type: string }
                      confirmedFeatures:
                        type: array
                        items: { type: string }
              example:
                subscriptions:
                  - deck:
                      uuid: deck-demo-zanki
                      id: deck-demo-zanki
                      name: Zanki Step 2 CK
                      card_count: 4
                      note_count: 4
                      last_updated: "2026-05-09T12:00:00.000Z"
                    deckMetadata:
                      uuid: deck-demo-zanki
                      id: deck-demo-zanki
                      name: Zanki Step 2 CK
                    role: owner
                    lastSyncAt: "2026-05-09T12:00:00.000Z"
                    pendingReviewCount: 1
                    unresolvedConflictCount: 0
                    capabilities:
                      subscriptions: true
                      deltaUpdates: true
                      cardSync: true
                      mediaUploadTargets: true
                      syncProof: true
                api:
                  namespace: /api
                  compatibility: ankihub-inspired
                  protocol: deckbridge
                  protocolVersion: "2026-05-09"

  /api/decks/{deckId}:
    get:
      summary: Get full deck state
      operationId: getDeck
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Complete deck state with cards, suggestions, sync info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/decks/{deckId}/updates:
    get:
      summary: Delta updates since a timestamp (AnkiHub-compatible)
      operationId: getDeckUpdates
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: since
          in: query
          required: true
          schema: { type: string, format: date-time }
          description: ISO 8601 timestamp. Only return changes after this time.
      responses:
        "200":
          description: Delta updates since timestamp
          content:
            application/json:
              schema:
                type: object
                properties:
                  deck: { $ref: "#/components/schemas/CompatDeck" }
                  since: { type: string, format: date-time }
                  lastUpdated: { type: string, format: date-time, nullable: true }
                  notes:
                    type: array
                    items: { $ref: "#/components/schemas/CompatNote" }
                  suggestions:
                    type: array
                    items: { $ref: "#/components/schemas/CompatSuggestion" }
                  suggestionStatusUpdates:
                    type: array
                    items:
                      type: object
                  media:
                    type: array
                    items:
                      type: object
                  templates:
                    type: array
                    items:
                      type: object
                  scheduling:
                    type: array
                    items:
                      type: object
                  syncProof:
                    type: object
                    nullable: true
                  counts:
                    type: object
                    properties:
                      notes: { type: integer }
                      suggestions: { type: integer }
              example:
                deck:
                  uuid: deck-demo-zanki
                  id: deck-demo-zanki
                  name: Zanki Step 2 CK
                since: "2026-05-09T11:30:00.000Z"
                lastUpdated: "2026-05-09T12:00:00.000Z"
                notes:
                  - guid: card-anca
                    anki_note_id: 9001
                    note_type: Basic
                    fields: { Front: "Question?", Back: "Answer" }
                    tags: [Rheumatology]
                    content_hash: 0f4c2d4ac5b9b7a7f850f062016eaf9c9d7f3ecb13a9fe271de43df18a12f7a1
                    updated_at: "2026-05-09T12:00:00.000Z"
                suggestionStatusUpdates:
                  - id: sugg-anca
                    status: accepted
                    compatStatus: approved
                    updatedAt: "2026-05-09T12:00:00.000Z"
                media:
                  - filename: large.png
                    storageBucket: deckbridge-media
                    storagePath: deck-demo-zanki/hash/large.png
                templates: []
                scheduling:
                  - cardId: card-anca
                    due: 47
                    state: Review
                    suspended: false
                syncProof:
                  syncedAt: "2026-05-09T12:00:00.000Z"
                  source: DeckBridge Anki add-on
                  stats: { total: 1, created: 0, updated: 1, skipped: 0, conflicts: 0, dryRun: false, mediaReceived: 1 }
                  mediaReceived: 1
                counts: { notes: 1, cards: 1, suggestions: 0, suggestionStatusUpdates: 1 }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/decks/{deckId}/cards:
    delete:
      summary: Bulk delete cards (owner only)
      operationId: deleteCards
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardIds]
              properties:
                cardIds:
                  type: array
                  maxItems: 500
                  items: { type: string }
      responses:
        "200":
          description: Number of deleted cards
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/decks/{deckId}/visibility:
    patch:
      summary: Set deck visibility (Supabase only, owner only)
      operationId: setDeckVisibility
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visibility]
              properties:
                visibility:
                  type: string
                  enum: [public, private, unlisted]
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  visibility: { type: string }

  /api/decks/{deckId}/models/{modelName}/template:
    patch:
      summary: Update card templates for a model (owner only)
      operationId: updateModelTemplate
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: modelName
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateFront: { type: string, default: "{{Front}}" }
                templateBack: { type: string, default: "{{FrontSide}}<hr id=answer>{{Back}}" }
                modelCss: { type: string }
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"

  /api/decks/{deckId}/fork:
    post:
      summary: Fork a public deck (Supabase only)
      operationId: forkDeck
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Fork created
          content:
            application/json:
              schema:
                type: object
                properties:
                  deckId: { type: string }
                  name: { type: string }

  /api/decks/{deckId}/star:
    post:
      summary: Star a deck
      operationId: starDeck
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Starred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarResult"
    delete:
      summary: Unstar a deck
      operationId: unstarDeck
      tags: [Decks]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unstarred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarResult"

  # ─── Suggestion Management ──────────────────────────────────
  /api/decks/{deckId}/suggestions:
    get:
      summary: List suggestions for a deck
      operationId: listSuggestions
      tags: [Suggestions]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected, revision]
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque pagination cursor
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Paginated suggestions list
          content:
            application/json:
              schema:
                type: object
                required: [suggestions, pagination]
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompatSuggestion"
                  pagination:
                    $ref: "#/components/schemas/CursorPage"
    post:
      summary: Create a suggestion (contributor+)
      operationId: createSuggestion
      tags: [Suggestions]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardId, reason]
              properties:
                cardId: { type: string }
                reason:
                  type: string
                  maxLength: 600
                  default: "Suggested from web app review."
                proposedFields:
                  type: object
                  additionalProperties: { type: string }
                  description: Field name → new value map
                proposedTags:
                  type: array
                  maxItems: 100
                  items: { type: string }
                diff:
                  type: object
                  deprecated: true
                  description: >
                    AnkiHub-compatible field/tag diff format. Only field and tag
                    diffs are accepted in this slice; media refs, template changes,
                    source metadata, and discussion state remain represented on
                    cards, sync proof, comments, and AI artifacts rather than as
                    suggestion diff fields.
      responses:
        "201":
          description: Suggestion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/decks/{deckId}/suggestions/bulk-decision:
    post:
      summary: Bulk accept/reject/revision (reviewer+)
      operationId: bulkDecideSuggestions
      tags: [Suggestions]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suggestionIds, decision]
              properties:
                suggestionIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items: { type: string }
                decision:
                  type: string
                  enum: [accepted, rejected, revision]
            example:
              suggestionIds: [sugg-anca, sugg-hpylori]
              decision: rejected
      responses:
        "200":
          description: Bulk decision applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppState"
              example:
                decks:
                  - id: deck-demo-zanki
                    name: Zanki Step 2 CK
                suggestions:
                  - id: sugg-anca
                    status: rejected
                    reviewedAt: "2026-05-09T12:00:00.000Z"
                  - id: sugg-hpylori
                    status: rejected
                    reviewedAt: "2026-05-09T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/decks/{deckId}/suggestions/import:
    post:
      summary: Import suggestions from CSV/TSV (contributor+)
      operationId: importSuggestions
      tags: [Suggestions]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 2000000
                  description: CSV or TSV content with Card ID column
                filename:
                  type: string
                  default: "cards.csv"
                  description: Used to detect delimiter (.tsv → tab)
            example:
              filename: changes.csv
              content: "Card ID,Front,Back,Reason\ncard-anca,Updated question?,Updated answer,Clarify wording\n"
      responses:
        "201":
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported: { type: integer }
                  skipped:
                    type: array
                    items:
                      type: object
                      properties:
                        cardId: { type: string }
                        reason: { type: string }
                  truncated: { type: boolean }
                  state: { $ref: "#/components/schemas/AppState" }
              example:
                imported: 1
                skipped: []
                state:
                  suggestions:
                    - id: sugg-imported
                      cardId: card-anca
                      status: pending
                      proposedFields:
                        Front: Updated question?

  /api/suggestions:
    get:
      summary: List suggestions across decks (AnkiHub-compatible)
      operationId: listSuggestionsCrossDecks
      tags: [Suggestions]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      deprecated: true
      parameters:
        - name: deckId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected, revision]
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Paginated suggestions across decks
          content:
            application/json:
              schema:
                type: object
                required: [suggestions, pagination]
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompatSuggestion"
                  pagination:
                    $ref: "#/components/schemas/CursorPage"

  /api/suggestions/{id}:
    patch:
      summary: Update suggestion status (reviewer+)
      operationId: updateSuggestion
      tags: [Suggestions]
      security: [{ BearerAuth: [] }, { DevAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
